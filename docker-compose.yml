services:
  db:
    image: mysql:8.0
    container_name: mysql-database-puntonews
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: news_portal
    # Los puertos 3306 se eliminan para producción por seguridad y para evitar conflictos.
    # La web se conecta internamente a través de la red del contenedor.
    volumes:
      - mysql_data_puntonews:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-web-app-puntonews
    ports:
      - "127.0.0.1:3003:3000" # Modificado para obligar a pasar por CloudPanel en puerto 3003 (para evitar choques con puerto 3002 de radarco)
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/news_portal
      - NEXTAUTH_URL=https://puntonews.online # CRÍTICO para que el login funcione en producción
      - NEXTAUTH_SECRET=news-portal-secret-key-change-in-production
      - HOSTNAME=0.0.0.0 # <-- LA SOLUCIÓN AL ERROR 502
    volumes:
      - /home/puntonews/htdocs/puntonews.online/public/uploads:/app/public/uploads
    restart: always

volumes:
  mysql_data_puntonews: